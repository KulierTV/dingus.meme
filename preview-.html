<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Black Metal Planet</title>
<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
}

h1{
  position:absolute;
  top:30px;
  left:40px;
  z-index:10;
  color:white;
}

canvas{
  display:block;
}
</style>
</head>
<body>
<h1>Black Metal Planet</h1>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<script>

// --- Szene & Kamera ---
const scene = new THREE.Scene()
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000)
camera.position.z = 3

// --- Renderer ---
const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth, window.innerHeight)
document.body.appendChild(renderer.domElement)

// --- Licht ---
const ambientLight = new THREE.AmbientLight(0x222222) // schwaches Umgebungslicht
scene.add(ambientLight)

const pointLight = new THREE.PointLight(0xffffff, 1.2)
pointLight.position.set(5,5,5)
scene.add(pointLight)

// --- Planet (Black Metal) ---
const geometry = new THREE.SphereGeometry(1, 128, 128)
const material = new THREE.MeshStandardMaterial({
  color: 0x0a0a0a,   // sehr dunkel
  metalness: 1,      // metallisch
  roughness: 0.25    // leicht rau für realistische Reflexion
})
const planet = new THREE.Mesh(geometry, material)
scene.add(planet)

// --- Atmosphere/Glow ---
const atmosphereGeo = new THREE.SphereGeometry(1.05, 128, 128)
const atmosphereMat = new THREE.MeshBasicMaterial({
  color: 0x4488ff,
  transparent: true,
  opacity: 0.15
})
const atmosphere = new THREE.Mesh(atmosphereGeo, atmosphereMat)
scene.add(atmosphere)

// --- Sterne ---
const starsGeo = new THREE.BufferGeometry()
const starCount = 2000
const starPositions = []

for(let i=0; i<starCount; i++){
  starPositions.push(
    (Math.random()-0.5)*200,
    (Math.random()-0.5)*200,
    (Math.random()-0.5)*200
  )
}
starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions,3))
const starMat = new THREE.PointsMaterial({color:0xffffff, size:0.3})
const stars = new THREE.Points(starsGeo, starMat)
scene.add(stars)

// --- Controls ---
const controls = new THREE.OrbitControls(camera, renderer.domElement)
controls.enableDamping = true
controls.enablePan = false

// --- Animation ---
function animate(){
  requestAnimationFrame(animate)
  planet.rotation.y += 0.002
  atmosphere.rotation.y += 0.002
  controls.update()
  renderer.render(scene, camera)
}
animate()

// --- Resize ---
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(window.innerWidth, window.innerHeight)
})

</script>
</body>
</html>
